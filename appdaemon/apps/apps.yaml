area_handler:
  module: area_handler
  class: AreaHandler
  priority: 10

state_manager:
  module: state_manager
  class: StateManager
  domains:
    - light
    - fan
    - cover
    - media_player
  exclude:
    - light.backyard_floodlight
    - light.0x84fd27fffebcd13a
  snapshot_path: "../data/state_manager.json"
  snapshot_interval: 60

global_automation_manager:
  module: automation_manager
  class: AutomationManager

global_notify:
  module: global_notify
  class: GlobalNotify
  default_notification_group: family
  groups:
    family:
      android:
        - mobile_app_pixel_10_pro_xl
    critical_alert_phones:
      android:
        - mobile_app_pixel_10_pro_xl
      ios:
        - mobile_app_iphone

all_lights:
  module: all_lights
  class: AllLights

simple_state_linker:
  module: simple_state_linker
  class: SimpleStateLinker
  groups:
    - entities: # garage
      - light.0x847127fffe991128 # garage light
      - light.ratgdov25i_47a1de_light # garage door light
      - light.0x00124b00226d6999 # workbench light
    - area: "Kitchen"
      domain: ["light"]
      exclude:
        - light.kitchen_sink_light
    - area: "Office"
    - area: "Gym"
    - area: "Game room"
      domains: ["light"]
      exclude:
        - light.0x847127fffebb7d2f # Stair lights
    - area: "Living room"
      exclude:
        - light.backyard_floodlight # camera lights
        - light.0x84fd27fffebcd13a # back porch lights
    - area: "Front bedroom"
    - area: "Nursery"
    - area: "Back bedroom"

garage_utils:
  module: garage_utils
  class: GarageUtils
  lights:
    # entrance light
    - light.0x847127fffebb5407
    # main garage light
    - light.0x847127fffe991128
    # ratgdo light
    - light.ratgdov25i_47a1de_light
  garage_door: cover.ratgdov25i_47a1de_door
  dependencies:
    - global_notify

garage_notify_automation:
  module: garage_notify_automation
  class: GarageNotifyAutomation
  garage_door: cover.ratgdov25i_47a1de_door
  garage_door_remote_lock: lock.ratgdov25i_47a1de_lock_remotes
  dependencies:
    - global_notify
    - garage_utils

garage_automation:
  module: garage_automation
  class: GarageAndLightsAutomation
  users:
    - name: "kyle"
      phone: device_tracker.pixel_10_pro_xl
      geocoded_location: sensor.pixel_10_pro_xl_geocoded_location
      cars:
        - auto_car: binary_sensor.pixel_10_pro_xl_android_auto
          bluetooth: sensor.pixel_10_pro_xl_bluetooth_connection
          bt_device: "94:B2:CC:CC:76:A5 (TOYOTA Tacoma)"
        - auto_car: binary_sensor.pixel_10_pro_xl_android_auto
          bluetooth: sensor.pixel_10_pro_xl_bluetooth_connection
          bt_device: "C4:B7:57:14:0B:FF (TOYOTA Sienna)"
  dependencies:
    - global_notify
    - garage_utils

auto_lock_doors:
  module: auto_lock
  class: AutoLock
  door_lock_map:
    binary_sensor.doors_front_door: lock.front_door_lock
    binary_sensor.doors_back_door: lock.back_door_lock
  enable_topic: home/autolock/front/enable
  timeout_topic: home/autolock/front/timeout

door_light_automation:
  module: door_light_automation
  class: DoorLightAutomation
  door_light_map:
    binary_sensor.doors_front_door:
      # entrance light
      - light.0x847127fffebb5407
      # porch light
      - light.0x847127fffebb7194
    binary_sensor.doors_garage_door:
      # entrance light
      - light.0x847127fffebb5407
      # ratgdo light
      - light.ratgdov25i_47a1de_light
      # garage light
      - light.0x847127fffe991128
    binary_sensor.doors_back_door:
      # back porch light
      - light.0x84fd27fffebcd13a
  timeout: 5  # minutes (converted to seconds internally)
  sun_entity: sun.sun
  next_rising_entity: sensor.sun_next_rising
  next_setting_entity: sensor.sun_next_setting
  grace_period: 60  # Grace period in minutes

doorbell:
  module: doorbell_notification
  class: DoorBellNotification
  sensor: binary_sensor.front_door_visitor

meeting_indicator:
  module: meeting_indicator
  class: MeetingIndicator
  namespace: default
  sensors:
    # office button
    - sensor.0x00158d0009f4df65_action
    # test button
    - sensor.0x00158d00087b83ae_action
  lights:
    # living room light
    - light.0xb0ce18140017db76

entity_monitor:
  module: entity_monitor
  class: EntityMonitor
  entities:
    # main ups 1
    - switch.0x282c02bfffea5d6a
    # main ups 2
    - switch.0x282c02bfffea5c8a
    # network ups
    - switch.0x282c02bfffea548c
    # test switch
    - switch.0x282c02bfffea274a
  check_interval: 120
  enable_last_seen: false

fan_auto_off:
  module: fan_auto_off
  class: FanAutoOff
  fans:
    fan.nursery_fan:
      time_limit: 120  # 2 hours in minutes
      cutoff_time: "21:30:00"
    fan.master_bedroom_fan:
      enforcement_time_start: "21:00:00"
      enforcement_time_end: "06:00:00"
      time_limit: 150  # 2.5 hours in minutes
      cutoff_time: "02:00:00"

blind_schedule:
  module: blind_schedule
  class: BlindSchedule
  groups:
    living_area:
      members:
        # living room
        - cover.blind_tilt_49f0
        # dining room
        - cover.blind_tilt_9f22
        # backdoor
        - cover.blind_tilt_b643
      defaults:
        direction: up
      triggers:
        - light_level:
            condition: below
            level: 2
          action: close
        - light_level:
            condition: above
            level: 2
          action: open
        - light_level:
            condition: above
            level: 8
          percentage: 75
        - light_level:
            condition: below
            level: 8
          action: open
  blinds:
    # dining room
    cover.blind_tilt_9f22:
      defaults:
        direction: up
      triggers:
        - light_level:
            condition: above
            level: 2
          action: close
          override: true
        - light_level:
            condition: above
            level: 6
          percentage: 75

    # back door
    cover.blind_tilt_b643:
      defaults:
        direction: up
      triggers:
        - time: "06:00:00"
          percentage: 50
        - time: "21:00:00"
          percentage: 50
        - time: "22:30:00"
          action: close

    # office
    cover.blind_tilt_d437:
      defaults:
        direction: up
      triggers:
        - light_level:
            condition: below
            level: 2
          action: close
          direction: down
        - light_level:
            condition: above
            level: 2
          action: open
        - light_level:
            condition: above
            level: 8
          percentage: 75
        - light_level:
            condition: below
            level: 8
          action: open

water_sensor_monitor:
  module: water_sensor_monitor
  class: WaterSensorMonitor
  notification_group: "critical_alert_phones"
  send_tts: false
  tts_max_volume: true
  main_water_valve_switch: switch.0xa4c1385bc05a3077
  water_sensors:
    - binary_sensor.0xa4c138374c40733e_water_leak # AC Overflow Pan
    - binary_sensor.0xa4c138864081ec78_water_leak # Interior AC electrical
    - binary_sensor.0xa4c1381e21b2137d_water_leak # Water Heater Overflow Pan
    - binary_sensor.0xa4c1386467236d8a_water_leak # Water softener
    - binary_sensor.0xa4c1384dbe966aa7_water_leak # Kitchen sink
    - binary_sensor.0xa4c138bbf2bee4de_water_leak # Downstairs bathroom sink
    - binary_sensor.0xa4c138a71398ed05_water_leak # Downstairs bathroom toilet
    - binary_sensor.0xa4c138b035472f64_water_leak # Master bathroom sink 1
    - binary_sensor.0xa4c138f93176fa30_water_leak # Master bathroom sink 2
    - binary_sensor.0xa4c1384958e7520d_water_leak # Master bathroom toilet
    - binary_sensor.0xa4c138d0dff30669_water_leak # Upstairs bathroom sink
    - binary_sensor.0xa4c138e84927fbb5_water_leak # Upstairs bathroom toilet
    - binary_sensor.0xa4c1384dfb580bc7_water_leak # Washer Overflow Pan
  shutoff_exclusion_sensors:
    - binary_sensor.0xa4c138374c40733e_water_leak # AC Overflow Pan
    - binary_sensor.0xa4c138864081ec78_water_leak # Interior AC electrical

republic_services_schedule:
  module: republic_services_schedule
  class: RepublicServicesSchedule
  # Address configuration: set rs_address in secrets.yaml OR create
  # input_text.rs_address entity in HA (preferred — changeable from HA UI).
  schedule_hour: 6  # Hour to refresh schedule (24h format, default: 6 AM)
  dependencies:
    - global_notify

testbutton:
  module: testbutton_notification
  class: TestButtonNotification
  sensor: sensor.test_button_action
  namespace: default
